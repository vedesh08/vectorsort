<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
   <title>VectorSort : Question Sorter    </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root {
            --bg-base: #020617;
            --bg-panel: rgba(15, 23, 42, 0.65);
            --bg-border: rgba(255, 255, 255, 0.08);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-glow: #38bdf8;
            --accent-warn: #fbbf24;
            --accent-danger: #ef4444;
        }

        /* GLOBAL */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* 🔥 Animated background */
        body {
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            padding: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;

            background: linear-gradient(-45deg, #020617, #0f172a, #020617, #1e293b);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            color: var(--text-main);
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* ✨ Glass panel */
        .fancy-panel {
            background: var(--bg-panel);
            backdrop-filter: blur(18px);
            border: 1px solid var(--bg-border);
            border-radius: 16px;
            box-shadow:
                0 10px 40px rgba(0, 0, 0, 0.6),
                inset 0 0 20px rgba(255, 255, 255, 0.03);
        }

        /* CONTROLS */
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            padding: 12px 16px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        /* WORKSPACE */
        .workspace {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 15px;
            flex: 1;
            min-height: 0;
        }

        /* PDF AREA */
        #pdf-wrapper {
            position: relative;
            overflow: auto;
            border-radius: 14px;

            background: radial-gradient(circle at top, #0f172a, #020617);
            border: 1px solid var(--bg-border);

            box-shadow:
                inset 0 0 30px rgba(0, 0, 0, 0.8),
                0 0 20px rgba(56, 189, 248, 0.08);
        }

        /* custom scrollbar (🔥 noticeable) */
        #pdf-wrapper::-webkit-scrollbar {
            width: 8px;
        }

        #pdf-wrapper::-webkit-scrollbar-thumb {
            background: linear-gradient(var(--accent-glow), transparent);
            border-radius: 10px;
        }

        #pdf-canvas {
            display: block;
            cursor: crosshair;
        }

        /* 🔥 Crop glow */
        #crop-overlay {
            position: absolute;
            border: 2px solid var(--accent-glow);
            background: rgba(56, 189, 248, 0.15);
            box-shadow:
                0 0 20px rgba(56, 189, 248, 0.8),
                inset 0 0 10px rgba(56, 189, 248, 0.5);
            pointer-events: none;
            display: none;
            z-index: 10;
        }

        /* SIDEBAR */
        .preview-sidebar {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        .preview-sidebar h4 {
            font-size: 13px;
            letter-spacing: 1px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* FINAL CANVAS */
        #final-canvas {
            width: 100%;
            background: white;
            border-radius: 10px;

            box-shadow:
                0 8px 30px rgba(0, 0, 0, 0.5),
                0 0 15px rgba(56, 189, 248, 0.2);
        }

        /* 🔥 BUTTONS */
        button {
            background: rgba(30, 41, 59, 0.6);
            color: var(--text-main);
            border: 1px solid var(--bg-border);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;

            transition: all 0.2s ease;
        }

        /* hover = alive */
        button:hover:not(:disabled) {
            background: rgba(56, 189, 248, 0.15);
            border-color: var(--accent-glow);
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.5);
            transform: translateY(-2px);
        }

        button:active:not(:disabled) {
            transform: scale(0.95);
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* 🔥 Special buttons */
        #save-btn {
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            color: #020617;
            border: none;
            margin-left: auto;

            box-shadow: 0 0 15px rgba(56, 189, 248, 0.8);
        }

        #save-btn:hover {
            box-shadow: 0 0 25px rgba(56, 189, 248, 1);
        }

        /* warning */
        .merge-btn {
            color: var(--accent-warn);
            border-color: rgba(251, 191, 36, 0.4);
        }

        .merge-btn:hover {
            box-shadow: 0 0 12px rgba(251, 191, 36, 0.6);
        }

        /* danger */
        .clear-btn {
            color: var(--accent-danger);
            border-color: rgba(239, 68, 68, 0.4);
        }

        .clear-btn:hover {
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.6);
        }

        /* GROUP CTRL */
        .group-ctrl {
            display: flex;
            gap: 3px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--bg-border);
            padding: 3px;
            border-radius: 10px;
        }

        /* TEXT */
        .value-display {
            font-family: monospace;
            font-size: 11px;
            min-width: 65px;
            text-align: center;
            align-self: center;
            color: var(--text-muted);
        }

        /* SELECT */
        select {
            background: rgba(30, 41, 59, 0.7);
            color: var(--text-main);
            border: 1px solid var(--bg-border);
            padding: 5px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        select:hover {
            border-color: var(--accent-glow);
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.5);
        }
    </style>
</head>

<body>

    <div class="controls fancy-panel">
        <input type="file" id="pdf-upload" accept="application/pdf">
        <button id="set-dir">📁 Link Folder</button>

        <div class="group-ctrl">
            <button id="prev-page">◀</button>
            <span class="value-display">P. <span id="page-num">1</span>/<span id="page-count">-</span></span>
            <button id="next-page">▶</button>
        </div>

        <div class="group-ctrl">
            <button id="zoom-out">-</button>
            <span class="value-display">Z: <span id="zoom-val">100%</span></span>
            <button id="zoom-in">+</button>
        </div>

        <select id="exam-tag">
            <option value="JM">JM</option>
            <option value="JA">JA</option>
            <option value="CET">CET</option>
            <option value="BITSAT">BITSAT</option>
        </select>
        <select id="diff-tag">
            <option value="E">E</option>
            <option value="M">M</option>
            <option value="T">T</option>
        </select>

        <button class="merge-btn" id="add-part">➕ Add Part</button>
        <button class="clear-btn" id="clear-canvas">🔄 Reset</button>
        <button id="save-btn" disabled>💾 Save Question</button>
    </div>

    <div class="workspace">
        <div id="pdf-wrapper">
            <div id="canvas-container" style="position: relative;">
                <canvas id="pdf-canvas"></canvas>
                <div id="crop-overlay"></div>
            </div>
        </div>
        <div class="preview-sidebar fancy-panel">
            <h4>Preview</h4>
            <canvas id="final-canvas"></canvas>
            <p style="font-size: 10px; color: var(--text-muted);">Crop area -> "Add Part" to stack or "Save" if done.
            </p>
        </div>
    </div>

    <canvas id="temp-canvas" style="display:none;"></canvas>

    <script>
        const pdfUpload = document.getElementById('pdf-upload');
        const pdfCanvas = document.getElementById('pdf-canvas');
        const finalCanvas = document.getElementById('final-canvas');
        const tempCanvas = document.getElementById('temp-canvas');
        const cropOverlay = document.getElementById('crop-overlay');
        const saveBtn = document.getElementById('save-btn');
        const pdfWrapper = document.getElementById('pdf-wrapper');

        let pdfDoc = null, curPage = 1, scale = 1.8;
        let directoryHandle = null;
        let isDragging = false, startX, startY;

        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        document.getElementById('set-dir').onclick = async () => {
            directoryHandle = await window.showDirectoryPicker();
            saveBtn.disabled = false;
            document.getElementById('set-dir').innerText = "✅ Linked";
        };

        document.getElementById('prev-page').onclick = () => { if (curPage > 1) renderPage(--curPage); };
        document.getElementById('next-page').onclick = () => { if (curPage < pdfDoc.numPages) renderPage(++curPage); };
        document.getElementById('zoom-in').onclick = () => { scale += 0.2; renderPage(curPage); };
        document.getElementById('zoom-out').onclick = () => { if (scale > 0.6) scale -= 0.2; renderPage(curPage); };

        pdfUpload.onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async function () {
                const loadingTask = pdfjsLib.getDocument({ data: new Uint8Array(this.result) });
                pdfDoc = await loadingTask.promise;
                document.getElementById('page-count').innerText = pdfDoc.numPages;
                renderPage(1);
            };
            reader.readAsArrayBuffer(file);
        };

        async function renderPage(num) {
            const page = await pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale: scale });
            pdfCanvas.height = viewport.height;
            pdfCanvas.width = viewport.width;
            await page.render({ canvasContext: pdfCanvas.getContext('2d'), viewport }).promise;
            document.getElementById('page-num').innerText = num;
            document.getElementById('zoom-val').innerText = Math.round(scale * 100 / 1.8) + "%";
        }

        // Fixed Scroll-aware Cropping
        pdfCanvas.onmousedown = (e) => {
            isDragging = true;
            const rect = pdfCanvas.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;
            cropOverlay.style.display = 'block';
        };

        window.onmousemove = (e) => {
            if (!isDragging) return;
            const rect = pdfCanvas.getBoundingClientRect();
            const curX = e.clientX - rect.left;
            const curY = e.clientY - rect.top;

            cropOverlay.style.width = Math.abs(curX - startX) + 'px';
            cropOverlay.style.height = Math.abs(curY - startY) + 'px';
            cropOverlay.style.left = Math.min(startX, curX) + 'px';
            cropOverlay.style.top = Math.min(startY, curY) + 'px';
        };

        window.onmouseup = (e) => {
            if (!isDragging) return;
            isDragging = false;
            const rect = pdfCanvas.getBoundingClientRect();
            const endX = e.clientX - rect.left;
            const endY = e.clientY - rect.top;

            const cropX = Math.min(startX, endX);
            const cropY = Math.min(startY, endY);
            const cropW = Math.abs(endX - startX);
            const cropH = Math.abs(endY - startY);

            if (cropW < 10) return;

            tempCanvas.width = cropW;
            tempCanvas.height = cropH;
            tempCanvas.getContext('2d').drawImage(pdfCanvas, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

            if (finalCanvas.height === 0) updateFinalCanvas(tempCanvas);
        };

        function updateFinalCanvas(source) {
            const fCtx = finalCanvas.getContext('2d');
            const oldData = finalCanvas.height > 0 ? fCtx.getImageData(0, 0, finalCanvas.width, finalCanvas.height) : null;
            const oldHeight = finalCanvas.height || 0;

            finalCanvas.width = Math.max(oldHeight ? finalCanvas.width : 0, source.width);
            finalCanvas.height = oldHeight + source.height + (oldHeight > 0 ? 10 : 0);

            fCtx.fillStyle = "white";
            fCtx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);
            if (oldData) fCtx.putImageData(oldData, 0, 0);
            fCtx.drawImage(source, 0, oldHeight > 0 ? oldHeight + 10 : 0);
        }

        document.getElementById('add-part').onclick = () => {
            if (tempCanvas.width > 0) updateFinalCanvas(tempCanvas);
            cropOverlay.style.display = 'none';
        };

        document.getElementById('clear-canvas').onclick = () => {
            finalCanvas.width = 0; finalCanvas.height = 0;
            cropOverlay.style.display = 'none';
        };

        saveBtn.onclick = async () => {
            if (!directoryHandle || finalCanvas.height === 0) return;
            const exam = document.getElementById('exam-tag').value;
            const diff = document.getElementById('diff-tag').value;
            try {
                const examDir = await directoryHandle.getDirectoryHandle(exam, { create: true });
                const diffDir = await examDir.getDirectoryHandle(diff, { create: true });
                const name = `Q_${exam}_${diff}_${Date.now()}.png`;
                const fileHandle = await diffDir.getFileHandle(name, { create: true });

                finalCanvas.toBlob(async (blob) => {
                    const writable = await fileHandle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                    alert("Saved!");
                    document.getElementById('clear-canvas').click();
                });
            } catch (err) { alert("Save Error!"); }
        };
    </script>
</body>

</html>
